<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Layout</title>
    <style>
        .main {
            display: grid;
            grid-template-areas:
                "box1 box1 box2 box3"
                "box4 box5 box5 box3";
            grid-gap: 10px;
        }

        .box1 {
            grid-area: box1;
            background: lawngreen;
        }

        .box2 {
            grid-area: box2;
            background: hotpink;
        }

        .box3 {
            grid-area: box3;
            background: skyblue;
        }

        .box4 {
            grid-area: box4;
            background: gold;
        }

        .box5 {
            grid-area: box5;
            background: silver;
        }
    </style>
</head>

<body>

    <div class="main">
        <div class="box1">1</div>
        <div class="box2">2</div>
        <div class="box3">3</div>
        <div class="box4">4</div>
        <div class="box5">5</div>
    </div>

</body>

</html>
