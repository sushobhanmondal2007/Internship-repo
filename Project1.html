<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Multiple Classes Example</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .box-styled {
            padding: 10px;
            border: 2px solid #3498db;
            margin: 10px;
        }

        .font-large {
            font-size: 24px;
        }

        .text-primary {
            color: rgb(12, 231, 12);
        }
    </style>
</head>


<body>

    <div class="box-styled font-large text-primary">
        Hello World! I am styled by three different classes.
    </div>

</body>

</html>
