<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Enrollment Terminal</title>
    <style>
        :root {
            --bg-color: #05080a;
            --panel-bg: rgba(10, 20, 25, 0.8);
            --accent-emerald: #10b981; /* Emerald Green */
            --accent-blue: #3b82f6;    /* Electric Blue */
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --border: rgba(16, 185, 129, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .terminal-container {
            width: 100%;
            max-width: 600px;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.1);
        }

        /* Section Numbering Style */
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .section-header .number {
            font-family: monospace;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-emerald);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
            font-weight: bold;
        }

        .section-header h3 {
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--accent-emerald);
        }

        /* Layout Grids */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .full-width { grid-column: span 2; }

        /* Form Inputs */
        .input-group {
            position: relative;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--accent-emerald);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        select option {
            background: #0f172a;
        }

        /* Preferred Learning Mode (Radio Buttons) */
        .mode-container {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .mode-option {
            flex: 1;
            position: relative;
        }

        .mode-option input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .mode-card {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-dim);
            transition: 0.3s;
            text-align: center;
        }

        .mode-option input:checked + .mode-card {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--accent-emerald);
            color: white;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        /* Button Styling */
        .finalize-btn {
            width: 100%;
            margin-top: 40px;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-emerald), var(--accent-blue));
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .finalize-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.4);
            filter: brightness(1.1);
        }

        /* Header Title */
        .form-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .form-title h2 {
            font-size: 1.8rem;
            background: linear-gradient(to right, #fff, var(--accent-emerald));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="terminal-container">
    <div class="form-title">
        <h2>STUDENT ENROLLMENT</h2>
    </div>

    <form action="#">
        
        <div class="section-header">
            <span class="number">01</span>
            <h3>Personal Details</h3>
        </div>
        <div class="grid">
            <div class="input-group full-width">
                <label>Full Name</label>
                <input type="text" placeholder="Enter legal name" required>
            </div>
            <div class="input-group">
                <label>Date of Birth</label>
                <input type="date" required>
            </div>
            <div class="input-group">
                <label>Gender Identification</label>
                <select required>
                    <option value="" disabled selected>Select option</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="non-binary">Non-binary</option>
                    <option value="none">Prefer not to say</option>
                </select>
            </div>
        </div>

        <div class="section-header">
            <span class="number">02</span>
            <h3>Communication Matrix</h3>
        </div>
        <div class="grid">
            <div class="input-group">
                <label>Academic Email</label>
                <input type="email" placeholder="student@edu.com" required>
            </div>
            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="+1 (000) 000-0000" required>
            </div>
        </div>

        <div class="section-header">
            <span class="number">03</span>
            <h3>Academic Mapping</h3>
        </div>
        <div class="grid">
            <div class="input-group full-width">
                <label>Target Course / Program</label>
                <select required>
                    <option value="" disabled selected>Select the module to enroll</option>
                    <option>Advanced Java & Object-Oriented Logic</option>
                    <option>Artificial Intelligence & Deep Learning</option>
                    <option>Data Structures & Core Algorithms</option>
                    <option>Full-Stack Interface Engineering</option>
                </select>
            </div>
            
            <div class="full-width">
                <label>Preferred Learning Mode</label>
                <div class="mode-container">
                    <label class="mode-option">
                        <input type="radio" name="mode" value="campus" checked>
                        <div class="mode-card">Accelerated (On-Campus)</div>
                    </label>
                    <label class="mode-option">
                        <input type="radio" name="mode" value="online">
                        <div class="mode-card">Virtual Sync (Online)</div>
                    </label>
                </div>
            </div>
        </div>

        <button type="submit" class="finalize-btn">Compile & Finalize Enrollment</button>

    </form>
</div>

</body>
</html>
